name: bot-watchdog
on:
  schedule:
    - cron: "*/30 * * * *"   # every 30 min (UTC)
  workflow_dispatch: {}
permissions:
  issues: write
  contents: write
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check dashboard freshness
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -e
          NOW=$(date +%s)
          # all three bots publish independent feeds; any one going stale is an incident
          # (2026-07-09: extended from paper.json-only to cover the mirror + rungv2 sidecars)
          STALE=""
          for FEED in paper mirror rungv2; do
            EPOCH=$(curl -sf "https://josh-max2.github.io/tradetest/data/${FEED}.json?cb=$NOW" | python3 -c "import sys,json;print(json.load(sys.stdin).get('generated_epoch',0))" || echo 0)
            AGE=$(( (NOW - EPOCH) / 60 ))
            echo "${FEED}.json age: ${AGE} min"
            if [ "$AGE" -gt 45 ]; then STALE="${STALE}${FEED} (${AGE}m) "; fi
          done
          OPEN=$(gh issue list -R josh-max2/kalshi-watchdog --state open --label bot-down --json number --jq 'length')
          if [ -n "$STALE" ]; then
            if [ "$OPEN" = "0" ]; then
              gh issue create -R josh-max2/kalshi-watchdog --label bot-down \
                --title "🔴 Trading feed(s) SILENT: ${STALE}" \
                --body "Stale feeds (threshold 45 min): **${STALE}** at https://josh-max2.github.io/tradetest/ . The corresponding bot or the PC is likely down. Orders on Kalshi are GTC (rungv2's carry 30-min self-expiry) and fail-safe, but no new placements are happening. Check the PC / tasks KalshiLiveTrader, KalshiMirror, KalshiRungV2."
            fi
          else
            if [ "$OPEN" != "0" ]; then
              N=$(gh issue list -R josh-max2/kalshi-watchdog --state open --label bot-down --json number --jq '.[0].number')
              gh issue close -R josh-max2/kalshi-watchdog "$N" -c "Recovered — all feeds fresh."
            fi
          fi
      - name: Monthly keepalive (prevents 60-day cron auto-disable)
        if: ${{ always() }}
        run: |
          if [ "$(date +%d%H)" = "0100" ] || [ ! -f .keepalive ]; then
            date > .keepalive
            git config user.email "watchdog@bot" && git config user.name "watchdog"
            git add .keepalive && git commit -m "keepalive" -q && git push -q || true
          fi
