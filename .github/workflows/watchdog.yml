name: bot-watchdog
on:
  schedule:
    - cron: "*/30 * * * *"   # every 30 min (UTC)
  workflow_dispatch: {}
permissions:
  issues: write
  contents: write
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check dashboard freshness
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -e
          NOW=$(date +%s)
          EPOCH=$(curl -sf "https://josh-max2.github.io/tradetest/data/paper.json?cb=$NOW" | python3 -c "import sys,json;print(json.load(sys.stdin).get('generated_epoch',0))" || echo 0)
          AGE=$(( (NOW - EPOCH) / 60 ))
          echo "data age: ${AGE} min"
          OPEN=$(gh issue list -R josh-max2/kalshi-watchdog --state open --label bot-down --json number --jq 'length')
          if [ "$AGE" -gt 45 ]; then
            if [ "$OPEN" = "0" ]; then
              gh issue create -R josh-max2/kalshi-watchdog --label bot-down \
                --title "🔴 Live trading bot SILENT for ${AGE} min" \
                --body "The dashboard data at https://josh-max2.github.io/tradetest/ hasn't updated in **${AGE} minutes** (threshold 45). The bot or the PC is likely down. Orders on Kalshi are GTC and fail-safe, but no new placements are happening. Check the PC / task KalshiLiveTrader."
            fi
          else
            if [ "$OPEN" != "0" ]; then
              N=$(gh issue list -R josh-max2/kalshi-watchdog --state open --label bot-down --json number --jq '.[0].number')
              gh issue close -R josh-max2/kalshi-watchdog "$N" -c "Recovered — data is ${AGE} min old."
            fi
          fi
      - name: Monthly keepalive (prevents 60-day cron auto-disable)
        if: ${{ always() }}
        run: |
          if [ "$(date +%d%H)" = "0100" ] || [ ! -f .keepalive ]; then
            date > .keepalive
            git config user.email "watchdog@bot" && git config user.name "watchdog"
            git add .keepalive && git commit -m "keepalive" -q && git push -q || true
          fi
